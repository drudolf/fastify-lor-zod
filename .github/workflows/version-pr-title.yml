name: Update Version PR Title

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize]

jobs:
  update-title:
    if: github.head_ref == 'changeset-release/main'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.head_ref }}
      - name: Set PR title to release version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          gh pr edit ${{ github.event.pull_request.number }} --title "release: v${VERSION}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
