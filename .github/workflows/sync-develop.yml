name: Sync develop

on:
  workflow_run:
    workflows: [Release]
    types: [completed]
    branches: [main]

jobs:
  sync:
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push'
    runs-on: ubuntu-latest
    concurrency:
      group: sync-develop
      cancel-in-progress: true
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Sync main into develop
        run: |
          if ! git ls-remote --exit-code --heads origin develop > /dev/null 2>&1; then
            echo "Branch 'develop' does not exist — skipping"
            exit 0
          fi

          git checkout develop
          git reset --hard origin/develop

          if git diff --quiet origin/main -- ; then
            echo "develop is already in sync with main"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          VERSION=$(git show origin/main:package.json | grep '"version"' | sed 's/.*"\([^"]*\)".*/\1/')

          git merge --squash origin/main
          git commit -m "chore: sync v${VERSION} release into develop"
          git push origin develop
